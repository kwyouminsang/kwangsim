<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고심리학 — 중간고사 모의고사</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0c0c0f;
  --card: #16161f;
  --card2: #1e1e2a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #c8a96e;
  --accent2: #e8c98e;
  --accent-dim: rgba(200,169,110,0.08);
  --text: #f0ede8;
  --text2: #a09a90;
  --text3: #5a5550;
  --ok: #4a9966;
  --ok-bg: rgba(74,153,102,0.12);
  --ok-bd: rgba(74,153,102,0.35);
  --no: #c05050;
  --no-bg: rgba(192,80,80,0.12);
  --no-bd: rgba(192,80,80,0.35);
  --purple: #8b7fc8;
  --purple-bg: rgba(139,127,200,0.1);
  --teal: #4a9fa8;
  --r: 12px;
  --rl: 18px;
  --serif: 'DM Serif Display', 'Georgia', serif;
  --sans: 'Noto Serif KR', 'Apple SD Gothic Neo', 'Malgun Gothic', serif;
  --mono: 'JetBrains Mono', 'Consolas', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.75;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.on { display: block; }
#intro.on {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 20px;
  text-align: center;
}
#result.on {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
  text-align: center;
}

/* ── ANIMATIONS ── */
@keyframes up {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.a1 { opacity:0; animation: up .8s .15s forwards; }
.a2 { opacity:0; animation: up .8s .30s forwards; }
.a3 { opacity:0; animation: up .8s .45s forwards; }
.a4 { opacity:0; animation: up .8s .60s forwards; }
.a5 { opacity:0; animation: up .8s .75s forwards; }
.a6 { opacity:0; animation: up .8s .90s forwards; }

/* ── INTRO ── */
.eyebrow {
  font-family: var(--serif);
  font-style: italic;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 28px;
}
.big-title {
  font-family: var(--serif);
  font-size: clamp(38px, 7vw, 72px);
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 10px;
}
.big-title em { font-style: italic; color: var(--accent); }
.sub {
  font-size: 13px;
  color: var(--text2);
  letter-spacing: 1.5px;
  margin-bottom: 52px;
}
.stat-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 14px;
  max-width: 640px;
  width: 100%;
  margin-bottom: 40px;
}
.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 22px 16px;
}
.stat-box .n {
  display: block;
  font-family: var(--serif);
  font-size: 30px;
  color: var(--accent);
  line-height: 1;
}
.stat-box .l {
  display: block;
  font-size: 11px;
  color: var(--text3);
  margin-top: 5px;
  letter-spacing: .5px;
}
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 640px;
  width: 100%;
  margin-bottom: 48px;
}
.tag {
  background: var(--accent-dim);
  border: 1px solid rgba(200,169,110,0.2);
  color: var(--accent);
  font-size: 12px;
  padding: 5px 14px;
  border-radius: 999px;
}
.btn-go {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--accent);
  color: #0c0c0f;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  padding: 16px 42px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  letter-spacing: .5px;
  transition: background .2s, transform .2s, box-shadow .2s;
}
.btn-go:hover {
  background: var(--accent2);
  transform: translateY(-2px);
  box-shadow: 0 14px 40px rgba(200,169,110,.28);
}

/* ── QUIZ HEADER ── */
#quiz { min-height: 100vh; padding-bottom: 80px; }
.qhdr {
  position: sticky;
  top: 0;
  z-index: 99;
  background: rgba(12,12,15,.93);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.qhdr-in {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 14px;
  height: 62px;
}
.qlogo {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}
.prog-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.prog-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}
.prog-track {
  height: 3px;
  background: var(--border2);
  border-radius: 99px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  width: 0%;
  transition: width .5s cubic-bezier(.34,1.56,.64,1);
}
.score-pill {
  background: var(--accent-dim);
  border: 1px solid rgba(200,169,110,.2);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 13px;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── SECTION DIVIDER ── */
.sec-div {
  max-width: 820px;
  margin: 44px auto 20px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.sec-line { flex: 1; height: 1px; background: var(--border); }
.sec-lbl {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
  letter-spacing: 1px;
}

/* ── QUESTION CARD ── */
.qwrap { max-width: 820px; margin: 0 auto; padding: 0 20px; }
.qcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--rl);
  padding: 26px 28px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
  animation: up .35s both;
}
.qcard::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--border2);
  transition: background .3s;
}
.qcard.c-ok::before { background: var(--ok); }
.qcard.c-no::before { background: var(--no); }

.qmeta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.qno {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
}
.bdg {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .8px;
  padding: 2px 9px;
  border-radius: 999px;
  text-transform: uppercase;
}
.bdg-obj { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(139,127,200,.25); }
.bdg-tf  { background: rgba(74,159,168,.1); color: var(--teal); border: 1px solid rgba(74,159,168,.25); }
.bdg-hard { background: rgba(192,80,80,.1); color: #e07070; border: 1px solid rgba(192,80,80,.25); margin-left: auto; }

.qtxt {
  font-size: 15px;
  line-height: 1.72;
  color: var(--text);
  margin-bottom: 18px;
  word-break: keep-all;
}
.qtxt em { font-style: normal; color: var(--accent2); }
.qtxt .case {
  display: block;
  background: rgba(200,169,110,.06);
  border-left: 2px solid rgba(200,169,110,.3);
  padding: 10px 14px;
  margin-top: 10px;
  border-radius: 0 var(--r) var(--r) 0;
  font-size: 14px;
  color: var(--text2);
  line-height: 1.65;
  font-style: italic;
}

/* ── OPTIONS ── */
.opts { display: flex; flex-direction: column; gap: 7px; }
.opt {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 12px 15px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  text-align: left;
  transition: background .12s, border-color .12s, color .12s;
  width: 100%;
}
.opt:hover:not([disabled]) { background: var(--card2); border-color: var(--border2); color: var(--text); }
.opt[disabled] { cursor: default; }
.opt-i {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  min-width: 18px;
  padding-top: 2px;
  flex-shrink: 0;
  transition: color .12s;
}
.opt:hover:not([disabled]) .opt-i { color: var(--accent); }
.opt.ok { background: var(--ok-bg); border-color: var(--ok-bd); color: #7dd4a0; }
.opt.ok .opt-i { color: var(--ok); }
.opt.no { background: var(--no-bg); border-color: var(--no-bd); color: #e09090; }
.opt.no .opt-i { color: var(--no); }

/* T/F */
.tfrow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tfbtn {
  padding: 15px 10px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-family: var(--serif);
  font-size: 24px;
  color: var(--text2);
  text-align: center;
  transition: background .12s, border-color .12s, color .12s;
  line-height: 1;
}
.tfbtn:hover:not([disabled]) { background: var(--card2); border-color: var(--border2); color: var(--text); }
.tfbtn[disabled] { cursor: default; }
.tflabel {
  display: block;
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: .5px;
  margin-top: 5px;
  color: var(--text3);
}
.tfbtn.ok { background: var(--ok-bg); border-color: var(--ok-bd); color: #7dd4a0; }
.tfbtn.ok .tflabel { color: var(--ok); }
.tfbtn.no { background: var(--no-bg); border-color: var(--no-bd); color: #e09090; }
.tfbtn.no .tflabel { color: var(--no); }

/* ── FEEDBACK ── */
.fb {
  display: none;
  margin-top: 12px;
  padding: 13px 15px;
  border-radius: var(--r);
  font-size: 13.5px;
  line-height: 1.65;
  border-left: 3px solid;
  word-break: keep-all;
}
.fb.on { display: block; }
.fb.ok { background: var(--ok-bg); border-color: var(--ok); color: #8dd8a8; }
.fb.no { background: var(--no-bg); border-color: var(--no); color: #e8a0a0; }
.fb strong { color: inherit; }

/* ── RESULT ── */
.res-eyebrow {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
  animation: up .6s both;
}
.res-score {
  font-family: var(--serif);
  font-size: clamp(80px, 16vw, 130px);
  color: var(--accent);
  line-height: 1;
  animation: up .6s .1s both;
}
.res-of {
  font-size: 13px;
  color: var(--text3);
  letter-spacing: 2px;
  margin-bottom: 36px;
  animation: up .6s .2s both;
}
.res-msg {
  font-size: 18px;
  color: var(--text2);
  max-width: 380px;
  line-height: 1.65;
  margin-bottom: 44px;
  animation: up .6s .3s both;
}
.res-grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 14px;
  max-width: 480px;
  width: 100%;
  margin-bottom: 44px;
  animation: up .6s .4s both;
}
.rc {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 10px;
  text-align: center;
}
.rc .rn {
  display: block;
  font-family: var(--serif);
  font-size: 30px;
}
.rc .rl { font-size: 11px; color: var(--text3); margin-top: 3px; }
.rc.ok .rn { color: var(--ok); }
.rc.no .rn { color: var(--no); }
.rc.sk .rn { color: var(--text3); }

.btn-retry {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--accent);
  border: 1px solid rgba(200,169,110,.4);
  font-family: var(--sans);
  font-size: 14px;
  padding: 14px 32px;
  border-radius: 999px;
  cursor: pointer;
  transition: background .2s, border-color .2s, transform .2s;
  animation: up .6s .5s both;
}
.btn-retry:hover {
  background: var(--accent-dim);
  border-color: var(--accent);
  transform: translateY(-2px);
}

/* ── REVIEW ── */
.rev-section {
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
  text-align: left;
  padding: 0 20px 60px;
  animation: up .6s .6s both;
}
.rev-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
  color: var(--text2);
  margin: 48px 0 18px;
  text-align: center;
}
.rev-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 18px;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.rdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--no);
  margin-top: 7px;
  flex-shrink: 0;
}
.rq { font-size: 13px; color: var(--text2); line-height: 1.5; }
.rtag { font-size: 11px; color: var(--text3); margin-top: 3px; display: block; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 580px) {
  .qcard { padding: 18px 16px; }
  .stat-row { grid-template-columns: repeat(3,1fr); gap: 8px; }
  .qhdr-in { gap: 8px; }
  .score-pill { font-size: 10px; padding: 5px 9px; }
  .big-title { font-size: clamp(32px,8vw,52px); }
}
</style>
</head>
<body>

<!-- ═══ INTRO ═══ -->
<div id="intro" class="screen on">
  <p class="eyebrow a1">Advertising Psychology · Mid-term Exam</p>
  <h1 class="big-title a2"><em>광고심리학</em><br>중간고사 모의고사</h1>
  <p class="sub a3">고난도 40문항 &nbsp;·&nbsp; 객관식 &amp; T/F 혼합</p>

  <div class="stat-row a4">
    <div class="stat-box"><span class="n">40</span><span class="l">총 문항</span></div>
    <div class="stat-box"><span class="n">7</span><span class="l">출제 단원</span></div>
    <div class="stat-box"><span class="n">★★★</span><span class="l">고난도</span></div>
  </div>

  <div class="tags a5">
    <span class="tag">감각·지각</span><span class="tag">주의</span>
    <span class="tag">동기이론</span><span class="tag">관여도</span>
    <span class="tag">학습·조건화</span><span class="tag">기억구조</span>
    <span class="tag">감정</span>
  </div>

  <button class="btn-go a6" onclick="startQuiz()">
    시험 시작하기
    <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
      <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- ═══ QUIZ ═══ -->
<div id="quiz" class="screen">
  <header class="qhdr">
    <div class="qhdr-in">
      <span class="qlogo">광고심리학</span>
      <div class="prog-wrap">
        <div class="prog-meta">
          <span id="ptxt">0 / 40</span>
          <span id="ppct">0%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="pfill"></div></div>
      </div>
      <div class="score-pill" id="spill">0점</div>
    </div>
  </header>
  <div id="qarea"></div>
</div>

<!-- ═══ RESULT ═══ -->
<div id="result" class="screen">
  <p class="res-eyebrow">Final Result</p>
  <div class="res-score" id="rscore">0</div>
  <p class="res-of">/ 40문항</p>
  <p class="res-msg" id="rmsg"></p>
  <div class="res-grid">
    <div class="rc ok"><span class="rn" id="rok">0</span><span class="rl">정답</span></div>
    <div class="rc no"><span class="rn" id="rno">0</span><span class="rl">오답</span></div>
    <div class="rc sk"><span class="rn" id="rsk">0</span><span class="rl">미응답</span></div>
  </div>
  <button class="btn-retry" onclick="retry()">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
      <path d="M2 8a6 6 0 1 1 1.5 4M2 12V8h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    다시 풀기
  </button>
  <div class="rev-section">
    <p class="rev-title">틀린 문제 복습</p>
    <div id="revlist"></div>
  </div>
</div>

<script>
const QS=[
  // ── 감각·지각·주의 (0-4)
  {t:'obj',h:true,
   q:'다음 중 지각적 조직화 원리에서 <em>군집화(grouping)</em>의 게슈탈트 법칙에 해당하지 않는 것은?',
   o:['유사성의 법칙: 유사한 자극들은 하나의 집단으로 묶인다','근접성의 법칙: 가까이 있는 자극들은 함께 묶여 지각된다','연속성의 법칙: 연속되는 패턴을 따라 자극을 지각한다','완결성의 법칙: 불완전한 형태를 완전한 것으로 지각한다','대비의 법칙: 서로 반대되는 색상과 형태를 하나의 단위로 지각한다'],
   a:4, e:'게슈탈트 군집화 법칙은 유사성, 근접성, 연속성, 완결성(폐쇄성)입니다. "대비의 법칙"은 군집화 원리가 아닌 별도의 대비 원리(contrast principle)로, 자극이 주변과 대비되어 더 눈에 띄는 현상입니다.'},
  {t:'tf',h:false,
   q:'[T/F] 차이역(JND)을 마케팅에 활용할 때, 소비자에게 유리한 변화(품질 개선)는 JND 이상으로 제시하고, 불리한 변화(가격 인상·용량 감소)는 JND 이하로 제시하는 것이 전략적으로 유리하다.',
   a:1, e:'옳습니다. JND 마케팅 전략의 핵심입니다. 좋은 변화는 눈에 띄게, 나쁜 변화는 눈치채지 못하도록 하는 것이 목표입니다.'},
  {t:'obj',h:true,
   q:'소비자의 <em>선택적 주의(selective attention)</em>에 영향을 미치는 개인적 요인으로만 묶인 것은?',

    idxs.forEach(i=>{ html+=card(QS[i],i); });
  });
  area.innerHTML=html;
}

function card(q,i){
  const num=String(i+1).padStart(2,'0');
  const b1=q.t==='obj'?'<span class="bdg bdg-obj">객관식</span>':'<span class="bdg bdg-tf">T / F</span>';
  const b2=q.h?'<span class="bdg bdg-hard">고난도</span>':'';
  const LBLS=['①','②','③','④','⑤'];

  let ctrl='';
  if(q.t==='obj'){
    ctrl=`<div class="opts">${q.o.map((o,j)=>`<button class="opt" id="q${i}o${j}" onclick="pick(${i},${j})"><span class="opt-i">${LBLS[j]}</span><span>${o}</span></button>`).join('')}</div>`;
  } else {
    ctrl=`<div class="tfrow"><button class="tfbtn" id="q${i}oT" onclick="pickTF(${i},1)">○<span class="tflabel">참 (True)</span></button><button class="tfbtn" id="q${i}oF" onclick="pickTF(${i},0)">✕<span class="tflabel">거짓 (False)</span></button></div>`;
  }
  return `<div class="qwrap"><div class="qcard" id="card${i}"><div class="qmeta"><span class="qno">Q${num}</span>${b1}${b2}</div><p class="qtxt">${q.q}</p>${ctrl}<div class="fb" id="fb${i}"></div></div></div>`;
}

function pick(qi,oi){
  if(done.has(qi)) return;
  done.add(qi);
  const q=QS[qi], LBLS=['①','②','③','④','⑤'];
  for(let j=0;j<q.o.length;j++){
    const el=document.getElementById(`q${qi}o${j}`);
    if(!el) continue;
    el.disabled=true;
    if(j===q.a) el.classList.add('ok');
    else if(j===oi) el.classList.add('no');
  }
  const ok=oi===q.a;
  if(ok) score++;
  feedback(qi,ok,q.e,ok?null:LBLS[q.a]);
  document.getElementById(`card${qi}`).classList.add(ok?'c-ok':'c-no');
  updateHdr();
}

function pickTF(qi,val){
  if(done.has(qi)) return;
  done.add(qi);
  const q=QS[qi];
  const tBtn=document.getElementById(`q${qi}oT`), fBtn=document.getElementById(`q${qi}oF`);
  tBtn.disabled=fBtn.disabled=true;
  const ok=val===q.a;
  if(val===1) tBtn.classList.add(ok?'ok':'no');
  else fBtn.classList.add(ok?'ok':'no');
  if(!ok)(q.a===1?tBtn:fBtn).classList.add('ok');
  if(ok) score++;
  feedback(qi,ok,q.e,ok?null:(q.a===1?'○ (참)':'✕ (거짓)'));
  document.getElementById(`card${qi}`).classList.add(ok?'c-ok':'c-no');
  updateHdr();
}

function feedback(qi,ok,exp,lbl){
  const fb=document.getElementById(`fb${qi}`);
  fb.className=`fb on ${ok?'ok':'no'}`;
  fb.innerHTML=ok?`<strong>✓ 정답!</strong> ${exp}`:`<strong>✗ 오답.</strong> 정답: <strong>${lbl}</strong> — ${exp}`;
}

function updateHdr(){
  const n=done.size, pct=Math.round(n/QS.length*100);
  document.getElementById('ptxt').textContent=`${n} / ${QS.length}`;
  document.getElementById('ppct').textContent=`${pct}%`;
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('spill').textContent=`${score}점`;
  if(n===QS.length) setTimeout(showResult,1100);
}

function showResult(){
  show('result');
  window.scrollTo(0,0);
  const w=done.size-score, s=QS.length-done.size;
  document.getElementById('rscore').textContent=score;
  document.getElementById('rok').textContent=score;
  document.getElementById('rno').textContent=w;
  document.getElementById('rsk').textContent=s;
  const pct=Math.round(score/QS.length*100);
  const msgs=['PPT를 처음부터 다시 꼼꼼히 읽고 재도전하세요.','핵심 개념 위주로 다시 정독이 필요합니다.','합격 수준이지만 고난도 개념을 한 번 더 점검하세요.','훌륭한 실력입니다. 틀린 문제만 복습하세요.','완벽합니다! 시험장에서도 이 실력 그대로 발휘하세요!'];
  document.getElementById('rmsg').textContent=msgs[pct>=90?4:pct>=75?3:pct>=60?2:pct>=40?1:0];

  let html='';
  QS.forEach((q,i)=>{
    const card=document.getElementById(`card${i}`);
    if(!done.has(i)||( card&&card.classList.contains('c-no'))){
      const lbl=q.t==='obj'?['①','②','③','④','⑤'][q.a]:(q.a===1?'○ (참)':'✕ (거짓)');
      const label=done.has(i)?`정답: ${lbl}`:'미응답';
      html+=`<div class="rev-item"><div class="rdot"></div><div class="rq"><strong>Q${i+1}.</strong> ${q.q.replace(/<[^>]+>/g,'').substring(0,85)}…<span class="rtag">${label} | ${q.t==='obj'?'객관식':'T/F'}</span></div></div>`;
    }
  });
  document.getElementById('revlist').innerHTML=html||'<p style="text-align:center;color:#5a5550;padding:24px 0;font-size:14px;">틀린 문제가 없습니다 🎉</p>';
}

function retry(){
  score=0; done=new Set();
  show('quiz');
  buildQ();
  document.getElementById('ptxt').textContent='0 / 40';
  document.getElementById('ppct').textContent='0%';
  document.getElementById('pfill').style.width='0%';
  document.getElementById('spill').textContent='0점';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
