<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고심리학 — 중간고사 모의고사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --bg2: #13131a;
    --bg3: #1a1a24;
    --card: #16161f;
    --card2: #1e1e2a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --accent-glow: rgba(200,169,110,0.15);
    --accent-dim: rgba(200,169,110,0.08);
    --text: #f0ede8;
    --text2: #a09a90;
    --text3: #5a5550;
    --correct: #4a9966;
    --correct-bg: rgba(74,153,102,0.12);
    --correct-border: rgba(74,153,102,0.35);
    --wrong: #c05050;
    --wrong-bg: rgba(192,80,80,0.12);
    --wrong-border: rgba(192,80,80,0.35);
    --purple: #8b7fc8;
    --purple-bg: rgba(139,127,200,0.1);
    --blue: #5a8fc8;
    --teal: #4a9fa8;
    --radius: 12px;
    --radius-lg: 18px;
    --radius-xl: 28px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  html { scroll-behavior: smooth; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    line-height: 1.75;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── SCREENS ── */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* ── INTRO ── */
  #intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }

  .intro-ornament {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .intro-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 6vw, 68px);
    font-weight: 400;
    line-height: 1.15;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 0.35s forwards;
  }

  .intro-title em {
    font-style: italic;
    color: var(--accent);
  }

  .intro-sub {
    font-size: 14px;
    color: var(--text2);
    letter-spacing: 1px;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }

  .intro-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 680px;
    width: 100%;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s 0.65s forwards;
  }

  .intro-stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
  }

  .intro-stat .num {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--accent);
    display: block;
  }

  .intro-stat .lbl {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .intro-chapters {
    max-width: 680px;
    width: 100%;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s 0.75s forwards;
  }

  .chapter-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .chapter-tag {
    background: var(--accent-dim);
    border: 1px solid rgba(200,169,110,0.2);
    color: var(--accent);
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 999px;
    letter-spacing: 0.3px;
  }

  .btn-start {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--accent);
    color: #0c0c0f;
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px 40px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    opacity: 0;
    animation: fadeUp 0.8s 0.85s forwards;
  }

  .btn-start:hover {
    background: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(200,169,110,0.25);
  }

  .btn-start svg { transition: transform 0.2s; }
  .btn-start:hover svg { transform: translateX(4px); }

  /* ── QUIZ HEADER ── */
  #quiz-screen { min-height: 100vh; padding: 0 0 80px; }

  .quiz-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,12,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .quiz-header-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 64px;
  }

  .quiz-logo {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--accent);
    white-space: nowrap;
  }

  .progress-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }

  .progress-track {
    height: 3px;
    background: var(--border2);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
    width: 0%;
  }

  .score-badge {
    background: var(--accent-dim);
    border: 1px solid rgba(200,169,110,0.2);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 999px;
    white-space: nowrap;
  }

  /* ── SECTION HEADER ── */
  .section-divider {
    max-width: 800px;
    margin: 48px auto 24px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-divider-line { flex: 1; height: 1px; background: var(--border); }

  .section-divider-label {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text3);
    white-space: nowrap;
    letter-spacing: 1px;
  }

  /* ── QUESTION CARD ── */
  .q-wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .q-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--border2);
    transition: background 0.3s;
  }

  .q-card.answered::before { background: var(--accent); }
  .q-card.answered-correct::before { background: var(--correct); }
  .q-card.answered-wrong::before { background: var(--wrong); }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
  }

  .q-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
  }

  .badge-obj {
    background: var(--purple-bg);
    color: var(--purple);
    border: 1px solid rgba(139,127,200,0.25);
  }

  .badge-tf {
    background: rgba(74,159,168,0.1);
    color: var(--teal);
    border: 1px solid rgba(74,159,168,0.25);
  }

  .badge-hard {
    background: rgba(192,80,80,0.1);
    color: #e07070;
    border: 1px solid rgba(192,80,80,0.25);
    margin-left: auto;
  }

  .q-text {
    font-size: 15.5px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 20px;
    word-break: keep-all;
  }

  .q-text .highlight {
    background: linear-gradient(to bottom, transparent 60%, rgba(200,169,110,0.25) 60%);
    color: var(--accent2);
  }

  /* ── OPTIONS ── */
  .opts { display: flex; flex-direction: column; gap: 8px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
    text-align: left;
    transition: all 0.15s;
    width: 100%;
  }

  .opt:hover:not(:disabled) {
    background: var(--card2);
    border-color: var(--border2);
    color: var(--text);
  }

  .opt:disabled { cursor: default; }

  .opt-idx {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    min-width: 20px;
    padding-top: 1px;
    font-weight: 500;
    flex-shrink: 0;
    transition: color 0.15s;
  }

  .opt:hover:not(:disabled) .opt-idx { color: var(--accent); }

  .opt.opt-correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
    color: #7dd4a0;
  }

  .opt.opt-correct .opt-idx { color: var(--correct); }

  .opt.opt-wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
    color: #e09090;
  }

  .opt.opt-wrong .opt-idx { color: var(--wrong); }

  .opt.opt-selected-wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
    color: #e09090;
  }

  /* T/F */
  .tf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .tf-btn {
    padding: 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text2);
    transition: all 0.15s;
    text-align: center;
  }

  .tf-btn:hover:not(:disabled) {
    background: var(--card2);
    border-color: var(--border2);
    color: var(--text);
  }

  .tf-btn:disabled { cursor: default; }

  .tf-btn .tf-label {
    display: block;
    font-family: 'Noto Serif KR', serif;
    font-size: 11px;
    letter-spacing: 1px;
    margin-top: 4px;
    color: var(--text3);
  }

  .tf-btn.tf-correct { background: var(--correct-bg); border-color: var(--correct-border); color: #7dd4a0; }
  .tf-btn.tf-correct .tf-label { color: var(--correct); }
  .tf-btn.tf-wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: #e09090; }
  .tf-btn.tf-wrong .tf-label { color: var(--wrong); }

  /* ── FEEDBACK ── */
  .feedback {
    display: none;
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.65;
    border-left: 3px solid;
  }

  .feedback.show { display: block; }

  .feedback.fb-ok {
    background: var(--correct-bg);
    border-color: var(--correct);
    color: #8dd8a8;
  }

  .feedback.fb-no {
    background: var(--wrong-bg);
    border-color: var(--wrong);
    color: #e8a0a0;
  }

  .feedback strong { color: inherit; font-weight: 700; }

  /* ── RESULT SCREEN ── */
  #result-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }

  .result-label {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    animation: fadeUp 0.6s both;
  }

  .result-score {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(72px, 14vw, 120px);
    color: var(--accent);
    line-height: 1;
    animation: fadeUp 0.6s 0.1s both;
  }

  .result-total {
    font-size: 14px;
    color: var(--text3);
    letter-spacing: 2px;
    margin-bottom: 40px;
    animation: fadeUp 0.6s 0.2s both;
  }

  .result-message {
    font-size: 20px;
    color: var(--text2);
    max-width: 400px;
    line-height: 1.6;
    margin-bottom: 48px;
    animation: fadeUp 0.6s 0.3s both;
  }

  .result-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 500px;
    width: 100%;
    margin-bottom: 48px;
    animation: fadeUp 0.6s 0.4s both;
  }

  .rb-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 12px;
  }

  .rb-num {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    display: block;
  }

  .rb-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .rb-card.rb-correct .rb-num { color: var(--correct); }
  .rb-card.rb-wrong .rb-num { color: var(--wrong); }
  .rb-card.rb-skip .rb-num { color: var(--text3); }

  .btn-retry {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(200,169,110,0.4);
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 500;
    padding: 14px 32px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    animation: fadeUp 0.6s 0.5s both;
  }

  .btn-retry:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  /* ── REVIEW ── */
  .review-section {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    text-align: left;
    padding: 0 24px;
    animation: fadeUp 0.6s 0.6s both;
  }

  .review-title {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--text2);
    margin: 48px 0 20px;
    text-align: center;
  }

  .review-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .review-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 7px;
    flex-shrink: 0;
  }

  .dot-correct { background: var(--correct); }
  .dot-wrong { background: var(--wrong); }

  .review-q { font-size: 13px; color: var(--text2); line-height: 1.55; }
  .review-q .tag { font-size: 11px; color: var(--text3); margin-top: 3px; display: block; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-card { animation: fadeUp 0.4s both; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(200,169,110,0.3); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .intro-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .q-card { padding: 20px 18px; }
    .result-breakdown { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .quiz-header-inner { gap: 10px; }
    .score-badge { font-size: 11px; padding: 5px 10px; }
  }

  /* Divider decoration */
  .deco-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 800px;
    margin: 40px auto 8px;
    padding: 0 24px;
  }
  .deco-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--border2)); }
  .deco-line.rev { background: linear-gradient(to left, transparent, var(--border2)); }
  .deco-diamond {
    width: 6px; height: 6px;
    background: var(--accent);
    transform: rotate(45deg);
    opacity: 0.6;
  }
</style>
</head>
<body>

<!-- ═══════════════ INTRO SCREEN ═══════════════ -->
<div id="intro" class="screen active">
  <p class="intro-ornament">Advertising Psychology · Mid-term Exam</p>
  <h1 class="intro-title"><em>광고심리학</em><br>중간고사 모의고사</h1>
  <p class="intro-sub">고난도 40문항 · 객관식 & T/F 혼합</p>

  <div class="intro-grid">
    <div class="intro-stat">
      <span class="num">40</span>
      <span class="lbl">총 문항</span>
    </div>
    <div class="intro-stat">
      <span class="num">7</span>
      <span class="lbl">출제 단원</span>
    </div>
    <div class="intro-stat">
      <span class="num">★★★</span>
      <span class="lbl">고난도</span>
    </div>
  </div>

  <div class="intro-chapters">
    <div class="chapter-list">
      <span class="chapter-tag">감각·지각</span>
      <span class="chapter-tag">주의</span>
      <span class="chapter-tag">동기이론</span>
      <span class="chapter-tag">관여도</span>
      <span class="chapter-tag">학습(조건화)</span>
      <span class="chapter-tag">기억구조</span>
      <span class="chapter-tag">감정</span>
    </div>
  </div>

  <button class="btn-start" onclick="startQuiz()">
    시험 시작하기
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- ═══════════════ QUIZ SCREEN ═══════════════ -->
<div id="quiz-screen" class="screen">
  <header class="quiz-header">
    <div class="quiz-header-inner">
      <span class="quiz-logo">광고심리학</span>
      <div class="progress-bar-wrap">
        <div class="progress-meta">
          <span id="prog-text">0 / 40</span>
          <span id="prog-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="prog-fill"></div>
        </div>
      </div>
      <div class="score-badge" id="score-badge">0점</div>
    </div>
  </header>
  <div id="questions-area"></div>
</div>

<!-- ═══════════════ RESULT SCREEN ═══════════════ -->
<div id="result-screen" class="screen">
  <p class="result-label">Final Result</p>
  <div class="result-score" id="res-score">0</div>
  <p class="result-total">/ 40문항</p>
  <p class="result-message" id="res-msg"></p>
  <div class="result-breakdown">
    <div class="rb-card rb-correct">
      <span class="rb-num" id="res-correct">0</span>
      <span class="rb-lbl">정답</span>
    </div>
    <div class="rb-card rb-wrong">
      <span class="rb-num" id="res-wrong">0</span>
      <span class="rb-lbl">오답</span>
    </div>
    <div class="rb-card rb-skip">
      <span class="rb-num" id="res-skip">0</span>
      <span class="rb-lbl">미응답</span>
    </div>
  </div>
  <button class="btn-retry" onclick="retryQuiz()">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">

    ans:1,
    exp:'옳습니다. 선택적 노출은 소비자의 처리 용량 한계로 인해 발생하며, 기존 신념이나 관련성 없는 정보를 회피합니다. 이를 극복하기 위해 마케터는 소비자의 접점에서 의도적 노출과 우연적 노출 기회를 높여야 합니다.'
  },

  // ── 최고난도 통합
  {
    type:'obj', hard:true,
    text:'다음 중 <span class="highlight">단기기억의 청각 부호화 우위성</span>이 마케팅에 주는 시사점으로 가장 적절한 것은?',
    opts:['TV광고는 시각 정보만 활용해야 한다','초기 단계에서 청각적 특징을 잘 활용하면 단기기억에서의 정보 생존 확률을 높일 수 있다','소비자에게 가능한 한 많은 시각 정보를 제공해야 한다','청각 정보는 장기기억으로 직접 전이되므로 별도 반복이 필요 없다','광고에서 음악을 사용하면 오히려 브랜드 정보 처리를 방해한다'],
    ans:1,
    exp:'단기기억에서 부호화는 주로 청각적으로 이루어집니다. 즉, 시각 정보도 청각 정보로 변환하여 처리합니다. 따라서 기억의 초기 단계에서 청각적 특징(징글, 브랜드명 발음 등)을 잘 활용하면 단기기억에서 정보가 생존할 확률이 높아집니다.'
  },
  {
    type:'obj', hard:true,
    text:'다음 중 <span class="highlight">소비자 동기, 관여도, 정보처리</span>의 관계를 종합적으로 설명한 것으로 가장 옳은 것은?',
    opts:['동기가 높을수록 관여도가 낮아지고 정보처리가 피상적이다','동기는 고-노력 행동을 유발하며, 이는 높은 관여도로 이어져 정보를 비판적으로 평가하고 기억하려는 노력을 증가시킨다','관여도는 동기와 독립적으로 결정되며, 오직 제품 가격에 의해서만 결정된다','저관여 상태에서도 소비자는 항상 정보를 비판적으로 평가한다','동기는 행동의 방향만 결정하고 강도와 지속성에는 영향을 미치지 않는다'],
    ans:1,
    exp:'동기는 목표와 일치된 고-노력 행동을 유발하며(시간·에너지 기꺼이 투자), 이는 감지된 관여도를 높이고, 고-노력 정보처리(주의·이해·비판적 평가·기억 노력)로 이어집니다. 동기, 관여도, 정보처리는 긴밀히 연결됩니다.'
  },
  {
    type:'obj', hard:true,
    text:'다음 사례에서 작동하는 심리적 원리를 가장 포괄적으로 설명한 것을 고르시오.<br><br><em>"명품 브랜드 C는 매장 내에 고급스러운 향기를 사용하고, 부드러운 촉감의 쇼핑백을 제공하며, 클래식 피아노 음악을 틀어 전반적으로 럭셔리한 분위기를 조성한다."</em>',
    opts:['FCB 그리드 2사분면(고관여·감성) 전략만 활용','조작조건화의 정적 강화만 작동','감각 마케팅 — 시각·청각·후각·촉각 등 복수의 감각을 동시에 활용하여 브랜드 연상과 구매행동에 영향을 미침','관찰학습 — 다른 소비자의 구매 행동을 모방','인지부조화 — 고가 구매 후 불안을 해소하는 전략'],
    ans:2,
    exp:'이 사례는 다양한 감각 채널(후각·촉각·청각)을 동시에 활용하는 감각 마케팅(sensory marketing)의 전형입니다. 향기(후각), 쇼핑백(촉각), 음악(청각)이 결합되어 럭셔리 브랜드 연상을 강화하고 감각 상호작용 효과를 활용합니다.'
  }
];

// ── State
let score = 0;
let answered = new Set();

function startQuiz() {
  document.getElementById('intro').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
  buildQuestions();
}

function buildQuestions() {
  const area = document.getElementById('questions-area');
  const sections = {
    '감각 · 지각 · 주의': [0,1,2,3,4],
    '동기이론': [5,6,7,8,9],
    '관여도': [10,11,12,13],
    '학습 — 조건화 & 관찰': [14,15,16,17,18,19],
    '기억 구조': [20,21,22,23,24,25,26],
    '감정': [27,28,29,30,31,32],
    '심화 · 통합': [33,34,35,36,37,38,39]
  };

  let html = '';
  Object.entries(sections).forEach(([title, indices]) => {
    html += `
      <div class="deco-divider">
        <div class="deco-line"></div>
        <div class="deco-diamond"></div>
      </div>
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <span class="section-divider-label">${title}</span>
        <div class="section-divider-line"></div>
      </div>
    `;
    indices.forEach(i => {
      const q = QS[i];
      html += buildCard(q, i);
    });
  });

  area.innerHTML = html;

  // animate cards on scroll
  const cards = area.querySelectorAll('.q-card');
  cards.forEach((c, i) => { c.style.animationDelay = `${Math.min(i * 0.04, 0.5)}s`; });
}

function buildCard(q, i) {
  const num = String(i+1).padStart(2,'0');
  const badge = q.type === 'obj'
    ? '<span class="q-badge badge-obj">객관식</span>'
    : '<span class="q-badge badge-tf">T / F</span>';
  const hardBadge = q.hard ? '<span class="q-badge badge-hard">고난도</span>' : '';

  let controls = '';
  if (q.type === 'obj') {
    const labels = ['①','②','③','④','⑤'];
    controls = `<div class="opts">${q.opts.map((o,j) =>
      `<button class="opt" id="q${i}o${j}" onclick="pickOpt(${i},${j})">`+
      `<span class="opt-idx">${labels[j]}</span><span>${o}</span></button>`
    ).join('')}</div>`;
  } else {
    controls = `<div class="tf-row">
      <button class="tf-btn" id="q${i}oT" onclick="pickTF(${i},1)">○<span class="tf-label">참 (True)</span></button>
      <button class="tf-btn" id="q${i}oF" onclick="pickTF(${i},0)">✕<span class="tf-label">거짓 (False)</span></button>
    </div>`;
  }

  return `
    <div class="q-wrap">
      <div class="q-card" id="card${i}">
        <div class="q-meta">
          <span class="q-num">Q${num}</span>
          ${badge}
          ${hardBadge}
        </div>
        <p class="q-text">${q.text}</p>
        ${controls}
        <div class="feedback" id="fb${i}"></div>
      </div>
    </div>`;
}

function pickOpt(qi, oi) {
  if (answered.has(qi)) return;
  answered.add(qi);
  const q = QS[qi];
  const labels = ['①','②','③','④','⑤'];

  for (let j = 0; j < q.opts.length; j++) {
    const el = document.getElementById(`q${qi}o${j}`);
    if (el) { el.disabled = true; }
    if (j === q.ans) el.classList.add('opt-correct');
    else if (j === oi) el.classList.add('opt-selected-wrong');
  }

  const correct = oi === q.ans;
  if (correct) score++;
  updateHeader();
  showFeedback(qi, correct, q.exp, correct ? null : labels[q.ans]);
  updateCard(qi, correct);
}

function pickTF(qi, val) {
  if (answered.has(qi)) return;
  answered.add(qi);
  const q = QS[qi];

  const tBtn = document.getElementById(`q${qi}oT`);
  const fBtn = document.getElementById(`q${qi}oF`);
  tBtn.disabled = fBtn.disabled = true;

  const correct = val === q.ans;
  if (val === 1) tBtn.classList.add(correct ? 'tf-correct' : 'tf-wrong');
  else fBtn.classList.add(correct ? 'tf-correct' : 'tf-wrong');
  if (!correct) {
    (q.ans === 1 ? tBtn : fBtn).classList.add('tf-correct');
  }

  if (correct) score++;
  updateHeader();
  showFeedback(qi, correct, q.exp, correct ? null : (q.ans===1?'○ (참)':'✕ (거짓)'));
  updateCard(qi, correct);
}

function showFeedback(qi, correct, exp, ansLabel) {
  const fb = document.getElementById(`fb${qi}`);
  fb.className = `feedback show ${correct ? 'fb-ok' : 'fb-no'}`;
  if (correct) {
    fb.innerHTML = `<strong>✓ 정답!</strong> ${exp}`;
  } else {
    fb.innerHTML = `<strong>✗ 오답.</strong> 정답: <strong>${ansLabel}</strong> — ${exp}`;
  }
}

function updateCard(qi, correct) {
  const card = document.getElementById(`card${qi}`);
  card.classList.add(correct ? 'answered-correct' : 'answered-wrong');
}

function updateHeader() {
  const n = answered.size;
  const pct = Math.round(n / QS.length * 100);
  document.getElementById('prog-text').textContent = `${n} / ${QS.length}`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('score-badge').textContent = `${score}점`;

  if (n === QS.length) {
    setTimeout(showResult, 1200);
  }
}

function showResult() {
  document.getElementById('quiz-screen').classList.remove('active');
  document.getElementById('result-screen').classList.add('active');
  window.scrollTo(0, 0);

  const wrong = answered.size - score;
  const skip = QS.length - answered.size;

  document.getElementById('res-score').textContent = score;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-skip').textContent = skip;

  const pct = Math.round(score / QS.length * 100);
  let msg = '';
  if (pct >= 90) msg = '완벽합니다. 시험장에서도 이 실력 그대로 발휘하세요!';
  else if (pct >= 75) msg = '훌륭한 실력입니다. 틀린 문제만 한 번 더 복습하세요.';
  else if (pct >= 60) msg = '합격 수준이지만, 고난도 개념을 한 번 더 점검하세요.';
  else if (pct >= 40) msg = '핵심 개념 위주로 다시 정독이 필요합니다.';
  else msg = 'PPT를 처음부터 다시 꼼꼼히 읽고 재도전해보세요.';
  document.getElementById('res-msg').textContent = msg;

  // Review wrong answers
  const reviewList = document.getElementById('review-list');
  let reviewHtml = '';
  QS.forEach((q, i) => {
    if (!answered.has(i)) {
      reviewHtml += `<div class="review-item">
        <div class="review-dot dot-wrong"></div>
        <div class="review-q">
          <strong>Q${i+1}.</strong> ${q.text.replace(/<[^>]+>/g,'').substring(0,80)}...
          <span class="tag">미응답 — ${q.type==='obj'?'객관식':'T/F'}</span>
        </div>
      </div>`;
    }
  });

  let wrongItems = [];
  QS.forEach((q, i) => {
    if (answered.has(i)) {
      const card = document.getElementById(`card${i}`);
      if (card && card.classList.contains('answered-wrong')) {
        wrongItems.push({q, i});
      }
    }
  });

  if (wrongItems.length === 0 && !reviewHtml) {
    reviewList.innerHTML = '<p style="text-align:center;color:var(--text3);font-size:14px;padding:20px 0;">틀린 문제가 없습니다! 🎉</p>';
  } else {
    wrongItems.forEach(({q, i}) => {
      const ansLabel = q.type === 'obj'
        ? ['①','②','③','④','⑤'][q.ans]
        : (q.ans === 1 ? '○ (참)' : '✕ (거짓)');
      reviewHtml += `<div class="review-item">
        <div class="review-dot dot-wrong"></div>
        <div class="review-q">
          <strong>Q${i+1}.</strong> ${q.text.replace(/<[^>]+>/g,'').substring(0,90)}
          <span class="tag">정답: ${ansLabel} | ${q.type==='obj'?'객관식':'T/F'}</span>
        </div>
      </div>`;
    });
    reviewList.innerHTML = reviewHtml;
  }
}

function retryQuiz() {
  score = 0;
  answered = new Set();
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('quiz-screen').classList.add('active');
  buildQuestions();
  updateHeader();
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
